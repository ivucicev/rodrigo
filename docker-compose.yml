services:
  server:
    build: ./server
    restart: unless-stopped
    environment:
      - PORT=4000
      - DB_PATH=/data/pool.sqlite3
    volumes:
      - pool-data:/data

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "8083:80"
    depends_on:
      - server

volumes:
  pool-data:
